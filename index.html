<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaCulture - Coming Soon</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: url("background.jpg") center center / cover no-repeat fixed;
    }

    .wrap {
      padding: 2rem;
    }

    .logo {
      width: clamp(500px, 15vw, 500px);
      margin-bottom: 75px;
      margin-top: 75px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      margin-top: 50px;
    }

    p {
      font-size: clamp(1.1rem, 3.4vw, 1.4rem);
      margin-bottom: 0.6rem;
    }

    .email {
      font-size: clamp(1.1rem, 3.4vw, 1.4rem);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      body { background-attachment: scroll; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="logo2.png" alt="IdeaCulture" class="logo" />
    <h1>Coming Soon</h1>
    <p>Get in touch</p>
    <p class="email">sagar@zeistinteractive.com</p>
  </div>
</body>
</html>
